<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 90" fill="none">
  <defs>
    <!-- Shield gradient: indigo → violet -->
    <linearGradient id="lgShield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <!-- Shield top highlight -->
    <linearGradient id="lgHL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="lgGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#4f46e5" flood-opacity="0.38" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── SHIELD ──────────────────────────────────────────── -->
  <!-- Shadow/glow behind shield -->
  <path d="M 42 3 L 80 15 L 80 52 Q 80 74 42 87 Q 4 74 4 52 L 4 15 Z"
        fill="#4f46e5" opacity="0.22" transform="translate(0,5)" filter="url(#lgGlow)"/>

  <!-- Main shield body -->
  <path d="M 42 3 L 80 15 L 80 52 Q 80 74 42 87 Q 4 74 4 52 L 4 15 Z"
        fill="url(#lgShield)"/>

  <!-- Top highlight -->
  <path d="M 42 3 L 80 15 L 80 36 Q 61 20 42 18 Q 23 20 4 36 L 4 15 Z"
        fill="url(#lgHL)"/>

  <!-- Inner bevel -->
  <path d="M 42 8 L 75 19 L 75 52 Q 75 70 42 82 Q 9 70 9 52 L 9 19 Z"
        fill="none" stroke="white" stroke-opacity="0.14" stroke-width="1"/>

  <!-- ── S LETTERFORM ────────────────────────────────────── -->
  <path d="
    M 52 28
    C 52 23, 48 20, 42 20
    C 35 20, 31 24, 31 29
    C 31 34, 35 37, 42 39
    C 49 41, 53 45, 53 51
    C 53 56, 49 60, 43 60
    C 37 60, 33 56, 33 52
  "
    stroke="white" stroke-width="5.5" stroke-linecap="round" fill="none" opacity="0.97"/>

  <!-- ── DIAGONAL SUTURE LINE ───────────────────────────── -->
  <line x1="53" y1="20" x2="31" y2="62"
        stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.72"/>

  <!-- Suture perpendicular tick marks (4 stitches) -->
  <!-- Tick 1 — upper area -->
  <line x1="45.5" y1="24.8" x2="53.3" y2="29.0"
        stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.72"/>
  <!-- Tick 2 -->
  <line x1="39.5" y1="33.8" x2="47.3" y2="38.0"
        stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.72"/>
  <!-- Tick 3 -->
  <line x1="33.5" y1="42.8" x2="41.3" y2="47.0"
        stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.72"/>
  <!-- Tick 4 — lower area -->
  <line x1="27.5" y1="51.8" x2="35.3" y2="56.0"
        stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.72"/>

  <!-- ── WORDMARK ───────────────────────────────────────── -->
  <!-- "SuturaSec" -->
  <text x="100" y="52"
        font-family="'Inter', 'DM Sans', ui-sans-serif, system-ui, -apple-system, sans-serif"
        font-size="30"
        font-weight="700"
        letter-spacing="-0.6"
        fill="white">SuturaSec</text>

  <!-- "SECURITY PLATFORM" -->
  <text x="102" y="67"
        font-family="'Inter', 'DM Sans', ui-sans-serif, system-ui, -apple-system, sans-serif"
        font-size="9"
        font-weight="500"
        letter-spacing="3"
        fill="#94a3b8">SECURITY PLATFORM</text>
</svg>

<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}SuturaSec{% endblock %}</title>
  <!-- Anti-FOUC: apply saved theme before render -->
  <script>
    (function(){
      var s = localStorage.getItem('ss_theme');
      var d = s ? s === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.classList.toggle('dark', d);
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: { 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5' }
          }
        }
      }
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    body { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-white antialiased min-h-screen">

  <!-- Floating theme toggle -->
  <button onclick="ssToggleTheme()"
          class="fixed top-4 right-4 z-50 w-9 h-9 flex items-center justify-center rounded-full
                 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700
                 shadow-md hover:shadow-lg transition-shadow
                 text-gray-600 dark:text-yellow-400">
    <!-- Moon (light mode) -->
    <svg class="dark:hidden" xmlns="http://www.w3.org/2000/svg" width="15" height="15"
         viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
    <!-- Sun (dark mode) -->
    <svg class="hidden dark:block" xmlns="http://www.w3.org/2000/svg" width="15" height="15"
         viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
  </button>

  {% block content %}{% endblock %}

  <script>
    function requireAuth() {
      if (!localStorage.getItem('token')) window.location.href = '/login';
    }
    function redirectIfAuth() {
      if (localStorage.getItem('token')) window.location.href = '/dashboard';
    }
    async function apiFetch(path, options = {}) {
      const token = localStorage.getItem('token');
      const res = await fetch('/api' + path, {
        ...options,
        headers: {
          'Content-Type': 'application/json',
          ...(token ? { Authorization: 'Bearer ' + token } : {}),
          ...(options.headers || {}),
        },
      });
      if (res.status === 401) {
        localStorage.removeItem('token');
        window.location.href = '/login';
      }
      return res;
    }
    function ssToggleTheme() {
      const isDark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('ss_theme', isDark ? 'dark' : 'light');
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}SuturaSec{% endblock %}</title>
  <!-- Anti-FOUC: apply saved theme before render -->
  <script>
    (function(){
      var s = localStorage.getItem('ss_theme');
      var d = s ? s === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.classList.toggle('dark', d);
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: { 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' }
          }
        }
      }
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    body { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
    .sidebar-link { transition: background-color 0.15s ease, color 0.15s ease; }
    .tab-btn { transition: color 0.15s ease, border-color 0.15s ease; }
    .fade-up { animation: fadeUp 0.25s ease-out both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #374151; border-radius: 99px; }
    .dark ::-webkit-scrollbar-thumb { background: #374151; }
  </style>
</head>

<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-white antialiased"
      x-data="layoutApp()" x-init="init()">

  <div class="flex h-screen overflow-hidden">

    <!-- ===== SIDEBAR ===== -->
    <!-- Mobile overlay -->
    <div x-show="sidebarOpen" x-cloak @click="sidebarOpen = false"
         class="fixed inset-0 z-20 bg-black/50 backdrop-blur-sm lg:hidden"></div>

    <aside
      :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'"
      class="fixed lg:static inset-y-0 left-0 z-30 w-64 flex flex-col
             bg-white dark:bg-gray-900
             border-r border-gray-200 dark:border-gray-800
             transition-transform duration-300 ease-in-out
             shadow-xl lg:shadow-none">

      <!-- Logo -->
      <div class="flex items-center gap-3 px-5 py-4 border-b border-gray-200 dark:border-gray-800">
        <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-indigo-500 to-violet-600
                    flex items-center justify-center flex-shrink-0
                    shadow-lg shadow-indigo-500/30">
          <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24"
               fill="none" stroke="white" stroke-width="2.5">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <div>
          <p class="font-bold text-gray-900 dark:text-white text-sm leading-tight tracking-tight">SuturaSec</p>
          <p class="text-[10px] text-gray-500 dark:text-gray-500 font-medium uppercase tracking-widest">SecaaS Platform</p>
        </div>
      </div>

      <!-- Nav -->
      <nav class="flex-1 overflow-y-auto px-3 py-4">

        <!-- Main features -->
        <p class="text-[10px] font-bold text-gray-400 dark:text-gray-600 uppercase tracking-widest px-3 mb-2">Plateforme</p>

        <a href="/dashboard"
           class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium mb-0.5"
           :class="isActive('/dashboard')
             ? 'bg-indigo-50 dark:bg-indigo-500/10 text-indigo-600 dark:text-indigo-400'
             : 'text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 hover:text-gray-900 dark:hover:text-white'">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
          </svg>
          Tableau de bord
        </a>

        <button @click="triggerNewScan('web')"
                class="sidebar-link w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium mb-0.5
                       text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 hover:text-gray-900 dark:hover:text-white">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
          Scanner Web
          <span class="ml-auto text-[10px] bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400 px-1.5 py-0.5 rounded font-bold">+</span>
        </button>

        <button @click="triggerNewScan('network')"
                class="sidebar-link w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium mb-0.5
                       text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 hover:text-gray-900 dark:hover:text-white">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="2" width="20" height="8" rx="2"/>
            <rect x="2" y="14" width="20" height="8" rx="2"/>
            <line x1="6" y1="6" x2="6.01" y2="6"/>
            <line x1="6" y1="18" x2="6.01" y2="18"/>
          </svg>
          Scanner Réseau
          <span class="ml-auto text-[10px] bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400 px-1.5 py-0.5 rounded font-bold">+</span>
        </button>

        <button @click="triggerNewScan('cti')"
                class="sidebar-link w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium mb-0.5
                       text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 hover:text-gray-900 dark:hover:text-white">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
          </svg>
          Threat Intel
          <span class="ml-auto text-[10px] bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400 px-1.5 py-0.5 rounded font-bold">+</span>
        </button>

        <a href="/dashboard"
           class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium mb-0.5
                  text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 hover:text-gray-900 dark:hover:text-white">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
          Rapports PDF
        </a>

        <!-- Separator + Coming Soon -->
        <div class="mt-5 mb-2 flex items-center gap-2 px-3">
          <p class="text-[10px] font-bold text-gray-400 dark:text-gray-600 uppercase tracking-widest">Bientôt</p>
          <span class="flex-1 h-px bg-gray-200 dark:bg-gray-800"></span>
          <span class="text-[10px] font-bold text-amber-600 dark:text-amber-500 bg-amber-50 dark:bg-amber-900/20 px-1.5 py-0.5 rounded">Roadmap</span>
        </div>

        <template x-for="f in comingSoon" :key="f.name">
          <div class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm cursor-default mb-0.5
                      text-gray-400 dark:text-gray-600 opacity-70">
            <span x-html="f.icon"></span>
            <span class="font-medium" x-text="f.name"></span>
            <span class="ml-auto text-[9px] bg-gray-100 dark:bg-gray-800 text-gray-400 dark:text-gray-600 px-1.5 py-0.5 rounded font-bold uppercase tracking-wider">Soon</span>
          </div>
        </template>
      </nav>

      <!-- User area -->
      <div class="border-t border-gray-200 dark:border-gray-800 px-3 py-3 flex-shrink-0">
        <div class="flex items-center gap-3 px-2 py-2.5 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors group cursor-default">
          <div class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-400 to-violet-500
                      flex items-center justify-center text-white text-xs font-bold flex-shrink-0 select-none"
               x-text="(user?.username || '?').charAt(0).toUpperCase()"></div>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-semibold text-gray-900 dark:text-white truncate" x-text="user?.username || '...'"></p>
            <p class="text-xs text-gray-500 truncate" x-text="user?.email || ''"></p>
          </div>
          <button @click="logout()" title="Déconnexion"
                  class="text-gray-400 hover:text-red-500 dark:hover:text-red-400
                         opacity-0 group-hover:opacity-100 transition-all duration-150 flex-shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
        </div>
      </div>
    </aside>

    <!-- ===== MAIN ===== -->
    <div class="flex-1 flex flex-col overflow-hidden min-w-0">

      <!-- Top bar -->
      <header class="flex-shrink-0 bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800
                     px-4 lg:px-6 py-3 flex items-center gap-3">
        <!-- Mobile hamburger -->
        <button @click="sidebarOpen = !sidebarOpen"
                class="lg:hidden text-gray-500 hover:text-gray-900 dark:hover:text-white p-1">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>

        <!-- Page title area -->
        <div class="flex-1 min-w-0">
          <h1 class="text-sm font-semibold text-gray-900 dark:text-white truncate">
            {% block page_title %}SuturaSec{% endblock %}
          </h1>
          <p class="text-xs text-gray-500 dark:text-gray-500 truncate hidden sm:block">
            {% block page_subtitle %}{% endblock %}
          </p>
        </div>

        <!-- Right side actions -->
        <div class="flex items-center gap-2 flex-shrink-0">
          {% block header_actions %}{% endblock %}

          <!-- Theme toggle -->
          <button @click="toggleTheme()"
                  title="Basculer thème"
                  class="w-8 h-8 flex items-center justify-center rounded-lg
                         border border-gray-200 dark:border-gray-700
                         bg-gray-50 dark:bg-gray-800
                         text-gray-500 dark:text-gray-400
                         hover:bg-gray-100 dark:hover:bg-gray-700
                         transition-colors">
            <!-- Sun: shown in dark mode -->
            <svg x-show="isDark" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="5"/>
              <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            <!-- Moon: shown in light mode -->
            <svg x-show="!isDark" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- Page content -->
      <main class="flex-1 overflow-y-auto bg-gray-50 dark:bg-gray-950 p-4 lg:p-6">
        {% block content %}{% endblock %}
      </main>
    </div>
  </div>

  <!-- ===== SCRIPTS ===== -->
  <script>
    function requireAuth() {
      if (!localStorage.getItem('token')) window.location.href = '/login';
    }
    function redirectIfAuth() {
      if (localStorage.getItem('token')) window.location.href = '/dashboard';
    }
    async function apiFetch(path, options = {}) {
      const token = localStorage.getItem('token');
      const res = await fetch('/api' + path, {
        ...options,
        headers: {
          'Content-Type': 'application/json',
          ...(token ? { Authorization: 'Bearer ' + token } : {}),
          ...(options.headers || {}),
        },
      });
      if (res.status === 401) {
        localStorage.removeItem('token');
        window.location.href = '/login';
      }
      return res;
    }

    function layoutApp() {
      return {
        user: null,
        sidebarOpen: false,
        isDark: document.documentElement.classList.contains('dark'),
        comingSoon: [
          { name: 'OSINT Recon',          icon: '<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>' },
          { name: 'API Security',         icon: '<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>' },
          { name: 'Cloud Security',       icon: '<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>' },
          { name: 'Phishing Simulator',   icon: '<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>' },
          { name: 'Subdomain Recon',      icon: '<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4"/></svg>' },
          { name: 'Scan Comparison',      icon: '<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>' },
        ],

        async init() {
          requireAuth();
          try {
            const res = await apiFetch('/auth/me');
            if (res.ok) this.user = await res.json();
          } catch {}
        },

        isActive(path) {
          const p = window.location.pathname;
          if (path === '/dashboard') return p === '/dashboard' || p.startsWith('/scans/');
          return p === path;
        },

        toggleTheme() {
          this.isDark = document.documentElement.classList.toggle('dark');
          localStorage.setItem('ss_theme', this.isDark ? 'dark' : 'light');
        },

        triggerNewScan(type) {
          if (window.location.pathname === '/dashboard') {
            window.dispatchEvent(new CustomEvent('open-new-scan', { detail: { type } }));
          } else {
            window.location.href = '/dashboard?scan=' + type;
          }
          this.sidebarOpen = false;
        },

        logout() {
          localStorage.removeItem('token');
          window.location.href = '/login';
        }
      }
    }
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
